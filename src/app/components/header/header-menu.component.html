<div class="menu-container">
  <!-- Menu de Navegação -->
  <nav class="nav-menu">
    <a routerLink="/home" routerLinkActive="active" (click)="fecharMenu()" class="nav-item">
      Home
    </a>
    <div class="nav-dropdown">
      <button (click)="toggleSubMenuEnderecos($event)" class="nav-item nav-dropdown-trigger" [class.open]="subMenuEnderecosAberto">
        Endereços
      </button>
      @if (subMenuEnderecosAberto) {
        <div class="nav-dropdown-menu">
          <a routerLink="/cep" routerLinkActive="active" (click)="fecharMenu()" class="nav-dropdown-item">
            Buscar Endereços
          </a>
        </div>
      }
    </div>
  </nav>

  <!-- Menu Mobile Toggle -->
  <button class="menu-toggle" (click)="toggle()" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</div>

<!-- Menu Mobile -->
@if (menuAberto) {
<nav class="nav-mobile">
  <a routerLink="/home" routerLinkActive="active" (click)="fecharMenu()" class="nav-item">Home</a>
  <div class="nav-dropdown">
    <button (click)="toggleSubMenuEnderecos($event)" class="nav-item nav-dropdown-trigger" [class.open]="subMenuEnderecosAberto">
      Endereços
    </button>
    @if (subMenuEnderecosAberto) {
      <div class="nav-dropdown-menu">
        <a routerLink="/cep" routerLinkActive="active" (click)="fecharMenu()" class="nav-dropdown-item">
          Buscar Endereços
        </a>
      </div>
    }
  </div>
</nav>
}
